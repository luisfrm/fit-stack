name: CI/CD Pipeline

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop]

jobs:
  validate:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Codebase
        run: pnpm turbo lint

      - name: Typecheck Applications
        run: pnpm turbo typecheck

      - name: Verify Build
        run: pnpm turbo build
