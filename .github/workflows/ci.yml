name: CI/CD Pipeline

on:
  pull_request:
    branches: [master, develop]

# Evita que se acumulen ejecuciones si haces varios commits seguidos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Affected Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para que Turbo compare cambios

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Turbo detecta automáticamente qué filtrar basándose en el historial de git
      # Usamos el SHA del commit base (en PRs) o el commit anterior (en Pushes)
      - name: Run CI Tasks
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          
          # Si por alguna razón BASE_SHA es nulo o vacío (ej: primer commit), comparamos con master
          BASE_SHA=${BASE_SHA:-master}

          echo "Comparing against: $BASE_SHA"
          
          pnpm turbo lint typecheck --filter="...[$BASE_SHA]"
